###############################################################################
# K8s CD — Frontend Docker Build → ECR Push → infra repo 태그 커밋 → ArgoCD 동기화
#
# 수동 트리거: workflow_dispatch로 환경 선택 후 배포
# 인증: GitHub Actions OIDC → AWS IAM Role (ECR push)
# 배포: ArgoCD가 infra repo의 kustomization.yaml 변경 감지 후 자동 sync
#
# 사전 설정:
#   - Repository variable: AWS_ACCOUNT_ID
#   - Environment secrets: INFRA_REPO_PAT (infra repo contents:write)
###############################################################################

name: K8s CD — Frontend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "배포 환경"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: k8s-deploy-fe-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: "Build & Push (frontend)"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/my-community-${{ inputs.environment }}-github-actions
          aws-region: ap-northeast-2

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build & push frontend-k8s
        env:
          IMAGE: ${{ steps.ecr-login.outputs.registry }}/my-community-${{ inputs.environment }}-frontend-k8s
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build --provenance=false --platform linux/amd64 -f Dockerfile -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

  update-image-tag:
    name: "Update Image Tag in Infra Repo"
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: revenantonthemission/2-cho-community-infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Update frontend image tag
        working-directory: infra/k8s/overlays/${{ inputs.environment }}
        env:
          REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
          ENV: ${{ inputs.environment }}
        run: |
          kustomize edit set image \
            "community-frontend=${REGISTRY}/my-community-${ENV}-frontend-k8s:${TAG}"

      - name: Commit and push
        working-directory: infra
        env:
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
          ENV: ${{ inputs.environment }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "k8s/overlays/${ENV}/kustomization.yaml"

          # 변경 없으면 커밋 스킵 (동일 SHA 재배포 시)
          if git diff --cached --quiet; then
            echo "kustomization.yaml에 변경 없음 — 커밋 스킵"
            exit 0
          fi

          git commit -m "deploy(${ENV}): frontend → ${TAG} [skip ci]"

          # 동시 push 경합 방지: rebase 후 재시도 (3회 실패 시 에러)
          PUSHED=false
          for i in 1 2 3; do
            if git push origin main; then
              PUSHED=true
              break
            fi
            echo "Push 실패 (시도 ${i}/3) — pull --rebase 후 재시도"
            git pull --rebase origin main
          done
          if [ "${PUSHED}" = "false" ]; then
            echo "::error::3회 push 모두 실패 — infra repo 업데이트 불가"
            exit 1
          fi

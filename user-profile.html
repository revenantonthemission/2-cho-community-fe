<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치 - 사용자 프로필</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/modules/user-profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+KR:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-title-wrapper">
            <button id="back-btn" class="back-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="black" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <h2>아무 말 대잔치</h2>
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container">
        <div class="user-profile-header">
            <div class="profile-img-wrapper">
                <img id="profile-img" src="/assets/profiles/default_profile.jpg" alt="프로필 이미지"
                    class="profile-img-large">
            </div>
            <h1 id="profile-nickname">로딩 중...</h1>
            <button type="button" id="block-user-btn" class="action-btn block-btn hidden">차단</button>
        </div>
        <div class="user-profile-posts">
            <h2>작성한 글</h2>
            <div id="user-posts-list" class="post-list">
                <!-- 사용자의 게시글 목록이 여기에 주입됩니다 -->
            </div>
            <div id="user-posts-empty" class="activity-empty hidden">
                <p>작성한 글이 없습니다.</p>
            </div>
        </div>
    </main>

    <div id="toast"></div>

    <script type="module" src="/js/app/userProfile.js"></script>
</body>

</html>

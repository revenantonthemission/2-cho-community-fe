# 프로덕션 nginx 설정 — React SPA + HTTPS

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name my-community.shop;
    location / {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name my-community.shop;

    # SSL 인증서 (certbot)
    ssl_certificate /etc/letsencrypt/live/my-community.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my-community.shop/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    root /usr/share/nginx/html;
    server_tokens off;

    # 보안 헤더
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API 프록시
    location /v1/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://my-community.shop' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, PATCH, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            return 204;
        }
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # 헬스 체크
    location /health {
        proxy_pass http://backend:8000;
    }

    # 업로드 파일
    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 정적 에셋 캐싱 (Vite 해시 포함)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — 모든 경로를 index.html로 보내고 React Router가 처리
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip 압축
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}

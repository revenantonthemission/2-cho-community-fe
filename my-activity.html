<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치 - 내 활동</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/modules/activity.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+KR:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-title-wrapper">
            <button id="back-btn" class="back-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="black" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <h2>아무 말 대잔치</h2>
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container">
        <h1>내 활동</h1>
        <div class="activity-tabs">
            <button class="tab-btn active" data-tab="posts">내가 쓴 글</button>
            <button class="tab-btn" data-tab="comments">내가 쓴 댓글</button>
            <button class="tab-btn" data-tab="likes">좋아요한 글</button>
        </div>
        <div id="activity-list" class="activity-list">
            <!-- 활동 목록이 여기에 주입됩니다 -->
        </div>
        <div id="activity-empty" class="activity-empty hidden">
            <p>활동 내역이 없습니다.</p>
        </div>
    </main>

    <div id="toast"></div>

    <script type="module" src="/js/app/myActivity.js"></script>
</body>

</html>

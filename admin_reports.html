<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치 - 신고 관리</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/pages/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+KR:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-title-wrapper">
            <button id="back-btn" class="back-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="black" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <h2>아무 말 대잔치</h2>
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container">
        <h2 class="page-title admin-page-title">신고 관리</h2>

        <div class="report-filter-tabs" id="report-filter-tabs">
            <button class="report-filter-tab active" data-status="pending">대기중</button>
            <button class="report-filter-tab" data-status="resolved">처리완료</button>
            <button class="report-filter-tab" data-status="dismissed">기각</button>
        </div>

        <div id="report-list" class="report-list">
            <!-- 신고 카드가 JS로 주입됨 -->
        </div>
        <div id="loading-sentinel">loading...</div>
    </main>

    <!-- 처리 확인 모달 -->
    <div id="confirm-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">신고를 처리하시겠습니까?</h3>
            <p id="modal-desc">이 작업은 되돌릴 수 없습니다.</p>
            <div class="modal-buttons">
                <button id="modal-cancel-btn" class="secondary-btn">취소</button>
                <button id="modal-confirm-btn" class="primary-btn">확인</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module" src="/js/app/adminReports.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치 - 이메일 인증</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+KR:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-title-wrapper">
            <button id="back-btn" class="back-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="black" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <h2>아무 말 대잔치</h2>
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container">
        <div class="verify-email-container" style="text-align: center; padding: 40px 20px;">
            <h1 style="margin-bottom: 20px;">이메일 인증</h1>
            <p id="verify-result" style="font-size: 16px; color: #666;">인증을 처리하고 있습니다...</p>
        </div>
    </main>

    <div id="toast"></div>

    <script type="module" src="/js/app/verifyEmail.js"></script>
</body>

</html>

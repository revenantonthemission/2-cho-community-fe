server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 클린 URL 리라이트 (CloudFront Functions 대체)
    location = /main          { try_files /main.html =404; }
    location = /login         { try_files /login.html =404; }
    location = /signup        { try_files /signup.html =404; }
    location = /password      { try_files /password.html =404; }
    location = /detail        { try_files /detail.html =404; }
    location = /write         { try_files /write.html =404; }
    location = /edit          { try_files /edit.html =404; }
    location = /edit-profile  { try_files /edit-profile.html =404; }
    location = /find-account  { try_files /find-account.html =404; }
    location = /notifications { try_files /notifications.html =404; }
    location = /my-activity   { try_files /my-activity.html =404; }
    location = /verify-email  { try_files /verify-email.html =404; }
    location = /user-profile  { try_files /user-profile.html =404; }
    location = /messages      { try_files /messages.html =404; }
    location = /messages/inbox  { try_files /messages-inbox.html =404; }
    location = /messages/detail { try_files /messages-detail.html =404; }
    location = /admin/reports   { try_files /admin-reports.html =404; }
    location = /admin/dashboard { try_files /admin-dashboard.html =404; }

    # 정적 에셋 캐싱
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA 폴백
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}

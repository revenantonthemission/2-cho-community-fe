<!DOCTYPE html>
<html lang="ko">

<head>
    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Camp Linux - 위키</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/pages/wiki.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,100..700;1,100..700&family=IBM+Plex+Sans+KR:wght@100..700&family=IBM+Plex+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-title-wrapper">
            <a href="/main" class="header-home-link"><h2>Camp Linux</h2></a>
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container">
        <section class="welcome-hero">
            <div class="welcome-hero__text">
                <h3 class="welcome-hero__heading">위키</h3>
                <p class="welcome-hero__sub">커뮤니티 지식 베이스 · FAQ · 가이드</p>
            </div>
            <nav class="welcome-hero__nav">
                <button id="write-btn" class="write-btn">페이지 작성</button>
            </nav>
        </section>

        <section class="search-sort-section">
            <div class="search-bar">
                <span class="search-bar__prompt">$</span>
                <input type="text" id="search-input" placeholder="search wiki..." maxlength="100" autocomplete="off">
                <button id="search-btn" class="search-btn">실행</button>
            </div>
            <div class="sort-buttons" id="sort-buttons">
                <button class="sort-btn active" data-sort="latest">최신순</button>
                <button class="sort-btn" data-sort="views">조회순</button>
                <button class="sort-btn" data-sort="updated">편집순</button>
            </div>
        </section>

        <section class="category-tabs" id="tag-filters">
            <!-- 태그 필터 버튼이 JS로 주입됨 -->
        </section>

        <section class="post-feed">
            <ul id="wiki-list" class="wiki-list">
            </ul>
            <div id="loading-sentinel">loading...</div>
        </section>
    </main>

    <div id="toast"></div>

    <script type="module" src="/js/app/wikiList.js"></script>
</body>

</html>

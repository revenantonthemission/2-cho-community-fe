<!DOCTYPE html>
<html lang="ko">

<head>
    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Camp Linux - 신고 관리</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/pages/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swapfamily=IBM+Plex+Sans+KR:wght@300;400;500;600;700https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swapfamily=IBM+Plex+Mono:wght@400;500;600;700https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swapdisplay=swap"
        rel="stylesheet">
</head>

<body>
    <a href="#main-content" class="skip-nav">본문으로 건너뛰기</a>
    <header>
        <div class="header-title-wrapper">
            <button id="back-btn" class="back-button" aria-label="뒤로 가기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <a href="/main" class="header-home-link"><h2>Camp Linux</h2></a>
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container" id="main-content">
        <h2 class="page-title admin-page-title">신고 관리</h2>

        <div class="report-filter-tabs" id="report-filter-tabs">
            <button class="report-filter-tab active" data-status="pending">대기중</button>
            <button class="report-filter-tab" data-status="resolved">처리완료</button>
            <button class="report-filter-tab" data-status="dismissed">기각</button>
        </div>

        <div id="report-list" class="report-list">
            <!-- 신고 카드가 JS로 주입됨 -->
        </div>
        <div id="loading-sentinel">loading...</div>
    </main>

    <!-- 처리 확인 모달 -->
    <div id="confirm-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">신고를 처리하시겠습니까?</h3>
            <p id="modal-desc">이 작업은 되돌릴 수 없습니다.</p>
            <div id="suspend-option" class="suspend-option hidden">
                <label class="suspend-checkbox-label">
                    <input type="checkbox" id="suspend-checkbox"> 작성자 계정 정지
                </label>
                <input type="number" id="report-suspend-days" class="modal-input"
                       min="1" max="365" value="7" disabled placeholder="정지 기간 (일)">
            </div>
            <div class="modal-buttons">
                <button id="modal-cancel-btn" class="secondary-btn">취소</button>
                <button id="modal-confirm-btn" class="primary-btn">확인</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module" src="/js/app/adminReports.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Camp Linux - 패키지</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/pages/packages.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Gowun+Batang:wght@400;700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Noto+Sans+KR:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-title-wrapper">
            <a href="/main" class="header-home-link"><h2>Camp Linux</h2></a>
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container">
        <section class="welcome-hero">
            <div class="welcome-hero__text">
                <h3 class="welcome-hero__heading">패키지 리뷰</h3>
                <p class="welcome-hero__sub">리눅스 패키지를 탐색하고 리뷰를 공유하세요</p>
            </div>
            <nav class="welcome-hero__nav">
                <button id="write-btn" class="write-btn">패키지 등록</button>
            </nav>
        </section>

        <section class="category-tabs" id="category-filters">
            <!-- 카테고리 필터 버튼이 JS로 주입됨 -->
        </section>

        <section class="search-sort-section">
            <div class="search-bar">
                <span class="search-bar__prompt">$</span>
                <input type="text" id="search-input" placeholder="search packages..." maxlength="100" autocomplete="off">
                <button id="search-btn" class="search-btn">실행</button>
            </div>
            <div class="sort-buttons" id="sort-buttons">
                <button class="sort-btn active" data-sort="latest">최신순</button>
                <button class="sort-btn" data-sort="rating">평점순</button>
                <button class="sort-btn" data-sort="reviews">리뷰순</button>
                <button class="sort-btn" data-sort="name">이름순</button>
            </div>
        </section>

        <section class="post-feed">
            <ul id="package-list" class="package-list">
            </ul>
            <div id="loading-sentinel">loading...</div>
        </section>
    </main>

    <div id="toast"></div>

    <script type="module" src="/js/app/packageList.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Camp Linux - 패키지 상세</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/pages/packages.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Gowun+Batang:wght@400;700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Noto+Sans+KR:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-title-wrapper">
            <button id="back-btn" class="back-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <a href="/main" class="header-home-link"><h2>Camp Linux</h2></a>
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container package-detail-container">
        <section id="package-info" class="package-info-section">
            <!-- 패키지 정보가 JS로 렌더링됨 -->
        </section>

        <div class="post-divider"></div>

        <section id="review-form-section" class="review-form-section">
            <!-- 리뷰 작성 폼이 JS로 렌더링됨 -->
        </section>

        <section class="reviews-section">
            <h3 class="reviews-section-title">리뷰</h3>
            <div id="reviews-list" class="reviews-list">
                <!-- 리뷰 목록이 JS로 렌더링됨 -->
            </div>
        </section>
    </main>

    <div id="toast"></div>

    <script type="module" src="/js/app/packageDetail.js"></script>
</body>

</html>

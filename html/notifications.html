<!DOCTYPE html>
<html lang="ko">

<head>
    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>아무 말 대잔치 - 알림</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/modules/notifications.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+KR:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-title-wrapper">
            <button id="back-btn" class="back-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <a href="/main" class="header-home-link"><h2>아무 말 대잔치</h2></a>
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container">
        <div class="notification-header">
            <h1>알림</h1>
            <div class="notification-header-actions">
                <button type="button" id="notification-settings-btn" class="notification-settings-btn" title="알림 설정">설정</button>
                <button type="button" id="mark-all-read-btn" class="mark-all-read-btn">모두 읽음</button>
            </div>
        </div>
        <div id="notification-settings-panel" class="notification-settings-panel hidden">
            <h3>알림 수신 설정</h3>
            <label class="notification-setting-row">
                <span>댓글</span>
                <input type="checkbox" id="setting-comment" checked>
            </label>
            <label class="notification-setting-row">
                <span>좋아요</span>
                <input type="checkbox" id="setting-like" checked>
            </label>
            <label class="notification-setting-row">
                <span>멘션</span>
                <input type="checkbox" id="setting-mention" checked>
            </label>
            <label class="notification-setting-row">
                <span>팔로우</span>
                <input type="checkbox" id="setting-follow" checked>
            </label>
            <label class="notification-setting-row">
                <span>북마크</span>
                <input type="checkbox" id="setting-bookmark" checked>
            </label>
        </div>
        <ul id="notification-list" class="notification-list">
            <!-- 알림 항목이 여기에 주입됩니다 -->
        </ul>
        <div id="notification-empty" class="notification-empty hidden">
            <p>알림이 없습니다.</p>
        </div>
    </main>

    <div id="toast"></div>

    <script type="module" src="/js/app/notifications.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Camp Linux</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-title-wrapper">
            <a href="/main" class="header-home-link"><h2>Camp Linux</h2></a>
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container">
        <!-- 환영 섹션 — 에디토리얼 헤드라인 + 내비게이션 -->
        <section class="welcome-hero">
            <div class="welcome-hero__text">
                <h3 id="welcome-message" class="welcome-hero__heading">Camp Linux에 오신 것을 환영합니다.</h3>
                <p class="welcome-hero__sub">배포판 토론 · Q&A · 위키 · 패키지 리뷰</p>
            </div>
            <nav class="welcome-hero__nav">
                <button id="write-btn" class="write-btn">게시글 작성</button>
            </nav>
        </section>

        <!-- 카테고리 탭 -->
        <section class="category-tabs" id="category-tabs"></section>

        <!-- 검색 + 정렬 — 커맨드 바 스타일 -->
        <section class="search-sort-section">
            <div class="search-bar">
                <span class="search-bar__prompt">$</span>
                <input type="text" id="search-input" placeholder="search posts..." maxlength="100" autocomplete="off">
                <button id="search-btn" class="search-btn">실행</button>
                <ul id="search-suggestions" class="search-suggestions" style="display:none"></ul>
            </div>
            <div class="feed-filters" id="feed-filters">
                <button class="feed-filter-btn hidden" id="foryou-btn">추천</button>
                <button class="feed-filter-btn hidden" id="following-btn">팔로잉</button>
                <div class="filter-divider hidden" id="filter-divider"></div>
                <div class="sort-buttons" id="sort-buttons">
                    <button class="sort-btn active" data-sort="latest">최신순</button>
                    <button class="sort-btn" data-sort="likes">인기순</button>
                    <button class="sort-btn" data-sort="views">조회순</button>
                    <button class="sort-btn" data-sort="comments">댓글순</button>
                </div>
            </div>
        </section>

        <!-- 게시글 피드 -->
        <section class="post-feed">
            <ul id="post-list"></ul>
            <div id="loading-sentinel"><span class="terminal-state__prompt">$</span> loading<span class="terminal-state__cursor">_</span></div>
        </section>
    </main>

    <div id="toast"></div>

    <script type="module" src="/js/app/main.js"></script>
</body>

</html>

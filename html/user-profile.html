<!DOCTYPE html>
<html lang="ko">

<head>
    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Camp Linux - 사용자 프로필</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/modules/user-profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swapfamily=IBM+Plex+Sans+KR:wght@300;400;500;600;700https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swapfamily=IBM+Plex+Mono:wght@400;500;600;700https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swapdisplay=swap"
        rel="stylesheet">
</head>

<body>
    <a href="#main-content" class="skip-nav">본문으로 건너뛰기</a>
    <header>
        <div class="header-title-wrapper">
            <button id="back-btn" class="back-button" aria-label="뒤로 가기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <a href="/main" class="header-home-link"><h2>Camp Linux</h2></a>
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container" id="main-content">
        <div class="user-profile-header">
            <div class="profile-img-wrapper">
                <img id="profile-img" src="/assets/profiles/default_profile.jpg" alt="프로필 이미지"
                    class="profile-img-large">
            </div>
            <h1 id="profile-nickname">로딩 중...</h1>
            <span id="suspension-badge" class="suspension-badge hidden"></span>
            <div id="profile-stats" class="profile-stats"></div>
            <div class="profile-action-buttons">
                <button type="button" id="send-dm-btn" class="action-btn dm-btn hidden">메시지 보내기</button>
                <button type="button" id="follow-user-btn" class="action-btn follow-btn hidden">팔로우</button>
                <button type="button" id="block-user-btn" class="action-btn block-btn hidden">차단</button>
                <button type="button" id="suspend-user-btn" class="action-btn suspend-btn hidden">정지</button>
            </div>
        </div>
        <div class="user-profile-posts">
            <h2>작성한 글</h2>
            <div id="user-posts-list" class="post-list">
                <!-- 사용자의 게시글 목록이 여기에 주입됩니다 -->
            </div>
            <div id="user-posts-empty" class="hidden">
                <div class="terminal-state">
                    <div class="terminal-state__bar">
                        <span class="terminal-state__dot terminal-state__dot--red"></span>
                        <span class="terminal-state__dot terminal-state__dot--yellow"></span>
                        <span class="terminal-state__dot terminal-state__dot--green"></span>
                    </div>
                    <div class="terminal-state__body">
                        <p><span class="terminal-state__prompt">$</span> ls posts/</p>
                        <span class="terminal-state__output">작성한 글이 없습니다.</span>
                        <span class="terminal-state__cursor">_</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 정지 확인 모달 -->
    <div id="suspend-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="suspend-modal-title">사용자를 정지하시겠습니까?</h3>
            <div class="suspend-form">
                <label for="suspend-days">정지 기간 (일)</label>
                <input type="number" id="suspend-days" class="modal-input" min="1" max="365" value="7">
                <label for="suspend-reason">정지 사유</label>
                <textarea id="suspend-reason" class="modal-input" rows="3" placeholder="정지 사유를 입력하세요"></textarea>
            </div>
            <div class="modal-buttons">
                <button id="suspend-cancel-btn" class="secondary-btn">취소</button>
                <button id="suspend-confirm-btn" class="primary-btn">정지</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module" src="/js/app/userProfile.js"></script>
</body>

</html>

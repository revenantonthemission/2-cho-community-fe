<!DOCTYPE html>
<html lang="ko">

<head>
    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Camp Linux - 게시글 작성</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/pages/write.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swapfamily=IBM+Plex+Sans+KR:wght@300;400;500;600;700https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swapfamily=IBM+Plex+Mono:wght@400;500;600;700https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swapdisplay=swap"
        rel="stylesheet">
</head>

<body>
    <a href="#main-content" class="skip-nav">본문으로 건너뛰기</a>
    <header>
        <div class="header-title-wrapper">
            <button id="back-btn" class="back-button" aria-label="뒤로 가기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <a href="/main" class="header-home-link"><h2>Camp Linux</h2></a>
            <!-- 헤더의 인증 관련 로직은 HeaderController에서 처리 -->
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container write-container" id="main-content">
        <h2 class="page-title">게시글 작성</h2>

        <form id="write-form">
            <div class="input-group">
                <label for="category-select">카테고리*</label>
                <div class="form-divider"></div>
                <select id="category-select" class="category-select" required>
                    <!-- 카테고리 옵션은 JS로 로드됨 -->
                </select>
                <div class="form-divider"></div>
            </div>

            <div class="input-group">
                <label for="tag-input">태그</label>
                <div id="tag-container" class="tag-input-container">
                    <div id="tag-chips" class="tag-chips"></div>
                    <input type="text" id="tag-input" placeholder="태그 입력 후 Enter (최대 5개)" maxlength="30">
                    <div id="tag-suggestions" class="tag-suggestions" style="display: none;"></div>
                </div>
            </div>

            <div class="input-group">
                <label for="post-title">제목*</label>
                <div class="form-divider"></div>
                <input type="text" id="post-title" placeholder="제목을 입력해주세요. (최대 26글자)" maxlength="26" required aria-describedby="validation-helper">
                <div class="form-divider"></div>
            </div>

            <div class="input-group">
                <label for="post-content">내용*</label>
                <div class="form-divider"></div>
                <textarea id="post-content" class="content-textarea" placeholder="내용을 입력해주세요." required></textarea>
                <div class="form-divider"></div>
            </div>

            <p id="validation-helper" class="helper-text">*제목, 내용을 모두 작성해주세요.</p>

            <div class="file-upload-section">
                <label class="file-upload-label">이미지</label>
                <div class="file-upload-row">
                    <input type="file" id="file-input" accept="image/*" multiple class="hidden-input">
                    <label for="file-input" class="file-select-btn">파일 선택</label>
                    <span id="file-name" class="file-name-text">파일을 선택해주세요.</span>
                </div>
                <div id="image-preview" class="hidden"></div>
            </div>

            <div class="submit-section">
                <button type="submit" id="submit-btn" class="submit-btn" disabled>완료</button>
            </div>

        </form>
    </main>

    <div id="toast"></div>

    <script type="module" src="/js/app/write.js"></script>
</body>

</html>

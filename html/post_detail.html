<!DOCTYPE html>
<html lang="ko">

<head>
    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Camp Linux - 게시글 상세</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/pages/detail.css">
    <link rel="stylesheet" href="/css/modules/comments.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <a href="#main-content" class="skip-nav">본문으로 건너뛰기</a>
    <header>
        <div class="header-title-wrapper">
            <button id="back-btn" class="back-button" aria-label="뒤로 가기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <a href="/main" class="header-home-link"><h2>Camp Linux</h2></a>
            <!-- 헤더의 인증 관련 로직은 HeaderController에서 처리 -->
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container post-detail-container" id="main-content">
        <!-- 게시글 내용 섹션 (Post Content Section) -->
        <article class="post-content-wrapper">
            <div id="post-badges" class="post-badges"></div>
            <div id="post-tags" class="post-tags"></div>
            <h1 id="post-title" class="detail-title">Loading...</h1>

            <div class="post-info-row">
                <div class="author-info">
                    <div class="author-profile-img" id="post-author-img"></div>
                    <span class="author-nickname" id="post-author-nickname">Unknown</span>
                    <span class="post-date" id="post-date"></span>
                </div>
                <div class="post-actions" id="post-actions">
                    <button class="action-btn" id="edit-post-btn">수정</button>
                    <button class="action-btn" id="delete-post-btn">삭제</button>
                </div>
            </div>

            <div class="post-divider"></div>

            <div class="post-body">
                <img id="post-image" src="" alt="Post Image" class="post-image hidden">
                <div id="image-gallery" class="image-gallery hidden"></div>
                <div id="post-content" class="markdown-body"></div>
            </div>

            <div class="post-stats-box">
                <div class="stat-box" id="like-box">
                    <div class="stat-value" id="like-count">0</div>
                    <div class="stat-label">좋아요</div>
                </div>
                <div class="stat-box" id="bookmark-box">
                    <div class="stat-value" id="bookmark-count">0</div>
                    <div class="stat-label">북마크</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="view-count">0</div>
                    <div class="stat-label">조회수</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="comment-count">0</div>
                    <div class="stat-label">댓글</div>
                </div>
            </div>

            <div class="post-extra-actions">
                <button id="share-post-btn" class="action-btn share-btn">공유</button>
                <button id="pin-post-btn" class="action-btn pin-btn" style="display:none">고정</button>
                <button id="block-user-btn" class="action-btn block-btn" style="display:none">차단</button>
                <button id="report-post-btn" class="action-btn report-btn" style="display:none">신고</button>
            </div>
        </article>

        <section class="related-posts-section hidden" id="related-posts-section">
            <h3 class="related-posts-title">관련 게시글</h3>
            <div class="related-posts-list" id="related-posts-list"></div>
        </section>

        <div class="post-divider"></div>

        <!-- 댓글 섹션 (Comment Section) -->
        <section class="comment-section">
            <div class="comment-input-wrapper">
                <div id="reply-indicator" class="reply-indicator hidden">
                    <span id="reply-indicator-text"></span>
                    <button id="reply-cancel-btn" class="reply-cancel-btn">취소</button>
                </div>
                <textarea id="comment-input" placeholder="댓글을 남겨주세요!"></textarea>
                <div class="comment-submit-wrapper">
                    <button id="comment-submit-btn" class="comment-submit-btn">댓글 등록</button>
                </div>
            </div>

            <ul id="comment-list" class="comment-list">
                <!-- 댓글이 여기에 주입됨 (Comments will be injected here) -->
            </ul>
        </section>
    </main>

    <!-- 신고 모달 (Report Modal) -->
    <div id="report-modal" class="modal hidden">
        <div class="modal-content">
            <h3>게시글 신고</h3>
            <div class="report-form">
                <label for="report-reason">신고 사유</label>
                <select id="report-reason" class="category-select">
                    <option value="spam">스팸</option>
                    <option value="abuse">욕설/비방</option>
                    <option value="inappropriate">부적절한 내용</option>
                    <option value="other">기타</option>
                </select>
                <label for="report-description">상세 설명 (선택)</label>
                <textarea id="report-description" placeholder="신고 사유를 자세히 설명해주세요." maxlength="500" rows="3"></textarea>
            </div>
            <div class="modal-buttons">
                <button id="report-cancel-btn" class="secondary-btn">취소</button>
                <button id="report-submit-btn" class="primary-btn">신고</button>
            </div>
        </div>
    </div>

    <!-- 모달 (Modal) -->
    <div id="confirm-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">게시글을 삭제하시겠습니까?</h3>
            <p id="modal-desc">삭제한 내용은 복구할 수 없습니다.</p>
            <div class="modal-buttons">
                <button id="modal-cancel-btn" class="secondary-btn">취소</button>
                <button id="modal-confirm-btn" class="primary-btn">확인</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module" src="/js/app/detail.js"></script>
</body>

</html>

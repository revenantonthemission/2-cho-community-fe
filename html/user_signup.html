<!DOCTYPE html>
<html lang="ko">

<head>
    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Camp Linux - 회원가입</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/pages/signup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <a href="#main-content" class="skip-nav">본문으로 건너뛰기</a>
    <header>
        <div class="header-title-wrapper">
            <button id="back-btn" class="back-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <a href="/main" class="header-home-link"><h2>Camp Linux</h2></a>
        </div>
    </header>

    <div class="signup-container" id="main-content">
        <h2 class="signup-title">회원가입</h2>

        <form id="signup-form">
            <div class="profile-section">
                <div class="profile-label-group">
                    <span class="profile-label">프로필 사진</span>
                    <span id="profile-helper" class="helper-text">* helper text</span>
                </div>

                <div class="profile-upload-area">
                    <label for="profile-upload" class="signup-profile-circle">
                        <span class="plus-icon">+</span>
                        <img id="profile-preview" class="profile-preview-img" src="" alt="Profile Preview">
                    </label>
                </div>
                <input type="file" id="profile-upload" name="profile" accept="image/*" class="hidden">
            </div>

            <div class="input-group">
                <label for="email" class="input-label">이메일*</label>
                <input type="email" id="email" name="email" class="input-field" required placeholder="이메일을 입력하세요"
                    autocomplete="email">
                <span id="email-helper" class="error-msg">* helper text</span>
            </div>

            <div class="input-group">
                <label for="password" class="input-label">비밀번호*</label>
                <input type="password" id="password" name="password" class="input-field" required
                    placeholder="비밀번호를 입력하세요" autocomplete="new-password">
                <span id="password-helper" class="error-msg">* helper text</span>
            </div>

            <div class="input-group">
                <label for="password-confirm" class="input-label">비밀번호 확인*</label>
                <input type="password" id="password-confirm" name="password-confirm" class="input-field" required
                    placeholder="비밀번호를 한번 더 입력하세요" autocomplete="new-password">
                <span id="password-confirm-helper" class="error-msg">* helper text</span>
            </div>

            <div class="input-group">
                <label for="nickname" class="input-label">닉네임*</label>
                <input type="text" id="nickname" name="nickname" class="input-field" required placeholder="닉네임을 입력하세요"
                    autocomplete="username">
                <span id="nickname-helper" class="error-msg">* helper text</span>
            </div>

            <div class="terms-section">
                <label class="terms-label">
                    <input type="checkbox" id="terms-checkbox">
                    <a id="terms-link" href="#" target="_blank" class="terms-link">이용약관</a>에 동의합니다.*
                </label>
                <span id="terms-helper" class="error-msg">* helper text</span>
            </div>

            <button type="submit" class="signup-btn" disabled>회원가입</button>
        </form>

        <div class="social-login-divider">또는</div>
        <div class="social-login-buttons">
            <a id="kakao-login-btn" class="social-login-btn social-login-btn--kakao" href="#">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.46 2 10.65c0 2.68 1.75 5.04 4.4 6.38-.16.56-.58 2.04-.66 2.36-.1.4.15.39.31.28.13-.08 2.04-1.38 2.86-1.95.68.1 1.38.15 2.09.15 5.52 0 10-3.46 10-7.72C22 6.46 17.52 3 12 3z"/></svg>
                카카오 로그인
            </a>
            <a id="naver-login-btn" class="social-login-btn social-login-btn--naver" href="#">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.27 3H7.73A4.73 4.73 0 003 7.73v8.54A4.73 4.73 0 007.73 21h8.54A4.73 4.73 0 0021 16.27V7.73A4.73 4.73 0 0016.27 3zm.46 12.6h-2.85l-3.06-4.36v4.36H7.97V8.4h2.85l3.06 4.36V8.4h2.85v7.2z"/></svg>
                네이버 로그인
            </a>
        </div>

        <div class="login-link-container">
            <a href="/login" class="login-link">로그인하러 가기</a>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module" src="/js/app/signup.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}document.documentElement.setAttribute("data-theme",t)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Camp Linux - 메시지</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/modules/dm.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swapfamily=IBM+Plex+Sans+KR:wght@300;400;500;600;700https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swapfamily=IBM+Plex+Mono:wght@400;500;600;700https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swapdisplay=swap"
        rel="stylesheet">
</head>

<body>
    <a href="#main-content" class="skip-nav">본문으로 건너뛰기</a>
    <header>
        <div class="header-title-wrapper">
            <a href="/main" class="header-home-link"><h2>Camp Linux</h2></a>
            <div id="auth-section" class="header-auth"></div>
        </div>
    </header>

    <main class="main-container" id="main-content">
        <div class="dm-desktop-layout">
            <!-- 좌측 사이드바: 대화 목록 -->
            <div class="dm-sidebar">
                <div class="dm-sidebar-header">
                    <h2 class="page-title">메시지</h2>
                </div>
                <div class="dm-search-bar">
                    <input type="text" id="dm-search" class="dm-search-input" placeholder="닉네임 검색...">
                </div>
                <div id="dm-list" class="dm-list"></div>
                <div id="dm-empty" class="dm-empty" style="display:none;">
                    <p>아직 대화가 없습니다.</p>
                </div>
            </div>

            <!-- 우측 패널: 채팅 영역 -->
            <div class="dm-main-panel">
                <div id="dm-no-selection" class="dm-no-selection">
                    <p>대화를 선택해주세요</p>
                </div>
                <div id="dm-chat-area" class="dm-chat-area" style="display:none;">
                    <div class="dm-detail-header">
                        <div id="dm-other-user" class="dm-other-user-info"></div>
                        <button id="dm-delete-btn" class="btn-icon" title="대화 삭제" aria-label="대화 삭제">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </button>
                    </div>
                    <div id="dm-messages" class="dm-messages"></div>
                    <div id="dm-typing" class="dm-typing"></div>
                    <div class="dm-input-area">
                        <div id="dm-editor" class="dm-editor-wrapper"></div>
                        <button id="dm-send-btn" class="btn-primary dm-send-btn">전송</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast"></div>

    <script type="module" src="/js/app/dm.js"></script>
</body>

</html>
